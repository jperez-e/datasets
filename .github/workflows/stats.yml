name: Stats

on: 
   push:
     branches: [ main ]
     
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repo 
      uses: :actions/checkout@v4
      
    - name: Setup python 
      uses: actions/setup-python@v5
      with:
         python-version: '3.11'
         
    - name: Run script
      run: python ./datasets/stats.py

    - name: Commit add Push Change
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Update Stats
        commit_user_name: Jose Perez [ Github Actions ]
        commit_user_email: espinal0599@gmail.com
        commit_author: jperez-e
    
    
